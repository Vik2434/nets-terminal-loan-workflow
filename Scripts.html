<script>
  window.NLFClient = {
    boot: typeof BOOT === 'undefined' ? {} : BOOT,

    run(fn, payload) {
      return new Promise((resolve, reject) => {
        const req = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(err => reject(new Error(err && err.message ? err.message : String(err))));

        if (payload === undefined) {
          req[fn]();
          return;
        }

        req[fn](payload);
      });
    },

    safe(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    },

    statusClass(status) {
      const v = String(status || '').toLowerCase();
      if (v.includes('pending')) return 'pill pending';
      if (v.includes('approved') || v.includes('returned') || v.includes('closed') || v.includes('complete') || v.includes('loan') || v.includes('notified')) return 'pill approved';
      if (v.includes('reject') || v.includes('cancel')) return 'pill rejected';
      return 'pill';
    },

    setNotice(el, type, text) {
      if (!el) return;
      el.className = `notice ${type || ''}`;
      el.textContent = text || '';
      el.classList.toggle('hidden', !text);
    },

    getParam(name) {
      const key = String(name || '').trim();
      if (!key) return '';

      const q = new URLSearchParams(window.location.search || '');
      const fromUrl = q.get(key) || q.get(key.toLowerCase()) || q.get(key.toUpperCase()) || '';
      if (fromUrl) return fromUrl;

      const params = (this.boot && this.boot.params) ? this.boot.params : {};
      return params[key] || params[key.toLowerCase()] || params[key.toUpperCase()] || '';
    },

    fmt(value) {
      if (!value) return '';
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return value;
      return dt.toLocaleString();
    }
  };
</script>
